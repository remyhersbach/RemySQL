<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#0d1f3c"/>
      <stop offset="100%" stop-color="#071428"/>
    </linearGradient>
    <linearGradient id="letter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#93d8fb"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="512" height="512" rx="100" fill="url(#bg)"/>
  <ellipse cx="200" cy="80" rx="220" ry="90" fill="#1e40af" opacity="0.12"/>

  <!--
    R als één aaneengesloten pad (fill-rule evenodd).
    Outer trace (CW): bar links + bovenkant + buitenzijde bowl + rechterpoot
    Inner trace: gat in de bowl
  -->
  <path fill-rule="evenodd" fill="url(#letter)" d="
    M 112,412
    L 112,104
    L 316,104
    Q 400,104 400,194
    Q 400,272 316,272
    L 385,412
    L 335,412
    L 236,272
    L 178,272
    L 178,412
    Z
    M 178,144
    L 314,144
    Q 356,144 356,194
    Q 356,228 314,228
    L 178,228
    Z
  "/>

  <rect x="418" y="146" width="70" height="14" rx="7" fill="url(#accent)"/>
  <rect x="418" y="178" width="54" height="14" rx="7" fill="url(#accent)"/>
  <rect x="418" y="210" width="62" height="14" rx="7" fill="url(#accent)"/>
</svg>
