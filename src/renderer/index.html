<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SQL Base Manager</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="connections-panel">
        <header class="panel-header">
          <div class="app-brand">
            <svg class="app-logo" viewBox="0 0 512 512" width="34" height="34" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <defs>
                <linearGradient id="logo-disc-top" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stop-color="#7dd3fc"/>
                  <stop offset="100%" stop-color="#38bdf8"/>
                </linearGradient>
                <linearGradient id="logo-disc-mid" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stop-color="#38bdf8"/>
                  <stop offset="100%" stop-color="#0ea5e9"/>
                </linearGradient>
                <linearGradient id="logo-disc-bot" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stop-color="#0ea5e9"/>
                  <stop offset="100%" stop-color="#0284c7"/>
                </linearGradient>
                <linearGradient id="logo-body" x1="0" y1="0" x2="1" y2="0">
                  <stop offset="0%" stop-color="#0369a1"/>
                  <stop offset="50%" stop-color="#0284c7"/>
                  <stop offset="100%" stop-color="#075985"/>
                </linearGradient>
              </defs>
              <rect x="102" y="175" width="308" height="185" fill="url(#logo-body)"/>
              <rect x="378" y="175" width="32" height="185" fill="#0c4a6e" opacity="0.45"/>
              <ellipse cx="256" cy="364" rx="154" ry="34" fill="#0b1220" opacity="0.32"/>
              <ellipse cx="256" cy="358" rx="154" ry="34" fill="url(#logo-disc-bot)"/>
              <ellipse cx="256" cy="350" rx="120" ry="14" fill="#38bdf8" opacity="0.35"/>
              <ellipse cx="256" cy="271" rx="154" ry="34" fill="#0b1220" opacity="0.28"/>
              <ellipse cx="256" cy="265" rx="154" ry="34" fill="url(#logo-disc-mid)"/>
              <ellipse cx="256" cy="257" rx="120" ry="14" fill="#7dd3fc" opacity="0.32"/>
              <ellipse cx="256" cy="178" rx="154" ry="34" fill="#0b1220" opacity="0.22"/>
              <ellipse cx="256" cy="172" rx="154" ry="34" fill="url(#logo-disc-top)"/>
              <ellipse cx="256" cy="161" rx="100" ry="12" fill="#bae6fd" opacity="0.4"/>
              <ellipse cx="240" cy="158" rx="50" ry="6" fill="#ffffff" opacity="0.22"/>
            </svg>
            <div>
              <p class="eyebrow">SQL Base</p>
              <h1>Database Manager</h1>
            </div>
          </div>
          <div class="header-actions">
            <button id="themeToggleButton" class="icon-button" title="Wissel thema" aria-label="Wissel thema">
              <svg class="theme-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
              </svg>
              <svg class="theme-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="12" cy="12" r="4"/>
                <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
              </svg>
            </button>
            <button id="newConnectionButton" class="icon-button" title="Nieuwe connectie">+</button>
          </div>
        </header>

        <section class="connection-form" id="connectionForm" hidden>
          <label>
            Type
            <select id="connectionTypeSelect">
              <option value="mariadb">MariaDB</option>
              <option value="sqlite">SQLite</option>
            </select>
          </label>
          <label>
            Naam
            <input id="connectionNameInput" type="text" placeholder="Lokale shop database" />
          </label>
          <div id="mariaFields" class="connection-fieldset">
            <label>
              Host
              <input id="mariaHostInput" type="text" value="127.0.0.1" />
            </label>
            <label>
              Poort
              <input id="mariaPortInput" type="number" min="1" max="65535" value="3306" />
            </label>
            <label>
              User
              <input id="mariaUserInput" type="text" placeholder="root" />
            </label>
            <label>
              Wachtwoord
              <input id="mariaPasswordInput" type="password" placeholder="Optioneel" />
            </label>
            <label>
              Database
              <input id="mariaDatabaseInput" type="text" placeholder="app_database" />
            </label>
          </div>
          <label id="sqlitePathField">
            SQLite pad
            <input id="connectionPathInput" type="text" placeholder="/pad/naar/database.sqlite" />
          </label>
          <div class="form-actions">
            <button id="saveConnectionButton" class="primary-button">Opslaan</button>
            <button id="cancelConnectionButton" class="ghost-button">Sluit</button>
          </div>
        </section>

        <div class="section-title">Connecties</div>
        <div id="connectionsList" class="connections-list"></div>
      </aside>

      <main class="workspace">
        <div class="toolbar">
          <div>
            <p id="activeConnectionLabel" class="eyebrow">Geen connectie</p>
            <h2 id="workspaceTitle">Open of maak een connectie</h2>
          </div>
          <div class="toolbar-actions">
            <button id="refreshButton" class="ghost-button" disabled>Ververs</button>
          </div>
        </div>

        <nav id="tabsBar" class="tabs-bar"></nav>

        <section id="emptyState" class="empty-state">
          <h2>Begin met een MariaDB connectie</h2>
          <p>Gebruik het menu Connecties of de plusknop links. Daarna kun je tabellen openen, filteren en relaties bekijken.</p>
        </section>

        <section id="tableView" class="table-view" hidden>
          <div class="table-controls">
            <div class="segmented-control" role="tablist" aria-label="Weergave">
              <button id="dataModeButton" class="active" role="tab">Data</button>
              <button id="structureModeButton" role="tab">Structuur</button>
            </div>
            <label class="filter-input">
              Filter
              <input id="filterInput" type="search" placeholder="Zoek in alle kolommen" />
            </label>
            <label class="limit-input">
              Limiet
              <input id="limitInput" type="number" min="1" max="500" value="100" />
            </label>
          </div>

          <div class="content-grid">
            <div class="data-panel">
              <div id="tableMeta" class="table-meta"></div>
              <div class="table-scroll">
                <table id="dataTable"></table>
              </div>
            </div>

            <aside class="relations-panel">
              <header>
                <p class="eyebrow">Foreign keys</p>
                <h3>Relaties</h3>
              </header>
              <div id="relationsList" class="relations-list"></div>
            </aside>
          </div>
        </section>
      </main>
    </div>

    <div id="toast" class="toast" hidden></div>

    <script src="./app.js"></script>
  </body>
</html>
