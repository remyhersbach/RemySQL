<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RemySQL</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="connections-panel">
        <header class="panel-header">
          <div class="app-brand">
            <svg class="app-logo" viewBox="0 0 512 512" width="34" height="34" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <defs>
                <linearGradient id="logo-bg" x1="0" y1="0" x2="0.6" y2="1">
                  <stop offset="0%" stop-color="#0d1f3c"/>
                  <stop offset="100%" stop-color="#071428"/>
                </linearGradient>
                <linearGradient id="logo-letter" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stop-color="#93d8fb"/>
                  <stop offset="100%" stop-color="#0ea5e9"/>
                </linearGradient>
                <linearGradient id="logo-accent" x1="0" y1="0" x2="1" y2="0">
                  <stop offset="0%" stop-color="#38bdf8"/>
                  <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
                </linearGradient>
              </defs>
              <rect x="0" y="0" width="512" height="512" rx="100" fill="url(#logo-bg)"/>
              <ellipse cx="200" cy="80" rx="220" ry="90" fill="#1e40af" opacity="0.12"/>
              <path fill-rule="evenodd" fill="url(#logo-letter)" d="M112,412 L112,104 L316,104 Q400,104 400,194 Q400,272 316,272 L385,412 L335,412 L236,272 L178,272 L178,412 Z M178,144 L314,144 Q356,144 356,194 Q356,228 314,228 L178,228 Z"/>
              <rect x="418" y="146" width="70" height="14" rx="7" fill="url(#logo-accent)"/>
              <rect x="418" y="178" width="54" height="14" rx="7" fill="url(#logo-accent)"/>
              <rect x="418" y="210" width="62" height="14" rx="7" fill="url(#logo-accent)"/>
            </svg>
            <div>
              <p class="eyebrow">RemySQL</p>
              <h1>Database Manager</h1>
            </div>
          </div>
          <div class="header-actions">
            <button id="themeToggleButton" class="icon-button" title="Wissel thema" aria-label="Wissel thema">
              <svg class="theme-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
              </svg>
              <svg class="theme-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="12" cy="12" r="4"/>
                <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
              </svg>
            </button>
            <button id="newConnectionButton" class="icon-button" title="Nieuwe connectie">+</button>
          </div>
        </header>

        <section class="connection-form" id="connectionForm" hidden>
          <p id="connectionFormTitle" class="eyebrow connection-form-title">Nieuwe connectie</p>
          <label>
            Type
            <select id="connectionTypeSelect">
              <option value="mariadb">MariaDB</option>
              <option value="sqlite">SQLite</option>
            </select>
          </label>
          <label>
            Naam
            <input id="connectionNameInput" type="text" placeholder="Lokale shop database" />
          </label>
          <div id="mariaFields" class="connection-fieldset">
            <label>
              Host
              <input id="mariaHostInput" type="text" value="127.0.0.1" />
            </label>
            <label>
              Poort
              <input id="mariaPortInput" type="number" min="1" max="65535" value="3306" />
            </label>
            <label>
              User
              <input id="mariaUserInput" type="text" placeholder="root" />
            </label>
            <label>
              Wachtwoord
              <input id="mariaPasswordInput" type="password" placeholder="Optioneel" />
            </label>
            <label>
              Database
              <input id="mariaDatabaseInput" type="text" placeholder="app_database" />
            </label>
          </div>
          <label id="sqlitePathField">
            SQLite pad
            <input id="connectionPathInput" type="text" placeholder="/pad/naar/database.sqlite" />
          </label>
          <div class="form-actions">
            <button id="saveConnectionButton" class="primary-button">Opslaan</button>
            <button id="cancelConnectionButton" class="ghost-button">Sluit</button>
          </div>
        </section>

        <div id="sidebarNav" class="sidebar-nav"></div>
        <div id="connectionsList" class="connections-list"></div>
      </aside>

      <main class="workspace">
        <div class="toolbar">
          <div>
            <p id="activeConnectionLabel" class="eyebrow">Geen connectie</p>
            <h2 id="workspaceTitle">Open of maak een connectie</h2>
          </div>
          <div class="toolbar-actions">
            <button id="refreshButton" class="ghost-button" disabled>Ververs</button>
          </div>
        </div>

        <nav id="tabsBar" class="tabs-bar"></nav>

        <section id="emptyState" class="empty-state">
          <h2>Begin met een MariaDB connectie</h2>
          <p>Gebruik het menu Connecties of de plusknop links. Daarna kun je tabellen openen, filteren en relaties bekijken.</p>
        </section>

        <section id="tableView" class="table-view" hidden>
          <div class="table-controls">
            <div class="segmented-control" role="tablist" aria-label="Weergave">
              <button id="dataModeButton" class="active" role="tab">Data</button>
              <button id="structureModeButton" role="tab">Structuur</button>
            </div>
            <div class="filter-area" id="filterArea">
              <span class="filter-label">Filter</span>
              <div class="filter-input-row">
                <div class="filter-text-mode" id="filterTextMode">
                  <input id="filterInput" type="search" placeholder="Zoek in alle kolommen" />
                </div>
                <div class="filter-column-mode" id="filterColumnMode" hidden>
                  <select id="filterColumnSelect">
                    <option value="">— kolom —</option>
                  </select>
                  <select id="filterOperatorSelect">
                    <option value="=">is gelijk aan</option>
                    <option value="!=">is niet gelijk aan</option>
                    <option value="LIKE">bevat</option>
                    <option value="BETWEEN">tussen</option>
                  </select>
                  <input id="filterValueInput" type="text" placeholder="Waarde..." />
                  <button id="filterValueDateBtn" class="filter-date-btn" hidden>Kies datum…</button>
                  <span id="filterBetweenSep" class="filter-between-sep" hidden>en</span>
                  <button id="filterValueToDateBtn" class="filter-date-btn" hidden>Kies datum…</button>
                </div>
                <button id="filterModeToggle" class="filter-mode-toggle" title="Zoek op specifieke kolom" aria-label="Zoek op specifieke kolom">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13" aria-hidden="true"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
                </button>
              </div>
            </div>
            <label class="limit-input">
              Limiet
              <input id="limitInput" type="number" min="1" max="500" value="100" />
            </label>
          </div>

          <div class="content-grid">
            <div class="data-panel">
              <div id="tableMeta" class="table-meta"></div>
              <div class="table-scroll">
                <table id="dataTable"></table>
              </div>
              <div class="table-actions" id="tableActions" hidden>
                <button id="addRowButton" class="ghost-button" disabled>+ Rij toevoegen</button>
                <div id="pendingActions" class="pending-actions" hidden>
                  <button id="saveRowsButton" class="primary-button">Opslaan</button>
                  <button id="discardRowsButton" class="remove-button">Annuleren</button>
                </div>
              </div>
            </div>

            <aside class="relations-panel collapsed" id="relationsPanel">
              <header>
                <div class="relations-panel-title">
                  <p class="eyebrow">Foreign keys</p>
                  <h3>Relaties</h3>
                </div>
                <button class="icon-button relations-toggle" id="relationsToggle" title="Relaties panel wisselen" aria-label="Relaties panel wisselen">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <polyline points="15 18 9 12 15 6"/>
                  </svg>
                </button>
              </header>
              <div id="relationsList" class="relations-list"></div>
            </aside>
          </div>
        </section>
      </main>
    </div>

    <div id="datePickerBackdrop" class="date-picker-backdrop" hidden></div>
    <div id="datePicker" class="date-picker-popover" hidden>
      <div class="date-picker-actions">
        <button id="datePickerCancel" class="ghost-button">Annuleer</button>
        <button id="datePickerConfirm" class="primary-button">OK</button>
      </div>
      <input id="datePickerInput" class="date-picker-input" />
    </div>

    <div id="toast" class="toast" hidden></div>

    <script src="./app.js"></script>
  </body>
</html>
